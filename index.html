<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tg-blue: #2481cc;
            --tg-bg: #f4f4f5;
            --tg-white: #ffffff;
            --tg-gray: #8e8e93;
            --tg-border: #dfe1e5;
            --tg-chat-bg: #e7ebf0;
        }

        body {
            background-color: var(--tg-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            height: 95vh;
            width: 95vw;
            max-width: 1200px;
            background: var(--tg-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            border-right: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--tg-chat-bg);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-repeat: repeat;
        }

        .message-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            position: relative;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-sent {
            background-color: #effdde;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message-received {
            background-color: var(--tg-white);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .timestamp {
            font-size: 10px;
            color: #a1a1a1;
            margin-left: 8px;
            float: right;
            margin-top: 6px;
        }

        #messages-area::-webkit-scrollbar {
            width: 6px;
        }
        #messages-area::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .user-item {
            cursor: pointer;
            transition: background 0.2s;
            padding: 12px 16px;
            border-bottom: 1px solid #f9f9f9;
        }
        .user-item:hover { background: #f4f4f5; }
        .user-item.active { background: var(--tg-blue); color: white !important; }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #2481cc 0%, #1c66a3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
        <div class="w-20 h-20 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i class="fa-brands fa-telegram text-4xl text-white"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Telegram Web</h2>
        <p class="text-gray-500 mb-8 text-sm">Введите данные для входа</p>
        
        <input type="text" id="username-input" placeholder="Ваше имя" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
        
        <input type="password" id="password-input" placeholder="Придумайте пароль" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
        
        <div id="auth-error" class="text-red-500 text-xs mb-4 hidden p-3 bg-red-50 rounded-lg border border-red-100">Ошибка</div>
        
        <button id="login-btn" class="w-full bg-blue-500 text-white p-4 rounded-xl font-bold hover:bg-blue-600 transition-all shadow-md active:scale-95 flex items-center justify-center gap-2">
            <span>Войти / Зарегистрироваться</span>
        </button>
        
        <p class="mt-4 text-[10px] text-gray-400 uppercase tracking-widest">Powered by Firebase</p>
    </div>
</div>

<div class="chat-container">
    <!-- Список чатов -->
    <div class="sidebar">
        <div class="p-4 border-b">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" placeholder="Поиск" class="w-full bg-gray-100 rounded-full py-2 pl-9 pr-4 text-sm focus:outline-none">
            </div>
        </div>
        
        <div id="users-list" class="flex-1 overflow-y-auto">
            <div class="p-8 text-center text-gray-400 text-sm">Загрузка пользователей...</div>
        </div>

        <div class="p-4 border-t bg-gray-50 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="my-avatar" class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">?</div>
                <div>
                    <div id="current-user-display" class="text-sm font-bold text-gray-800">Имя</div>
                    <div class="text-[10px] text-green-500 font-bold uppercase">Online</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Область сообщений -->
    <div class="main-chat">
        <div id="chat-header" class="hidden p-3 bg-white border-b flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div id="chat-avatar" class="w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center text-white font-bold">?</div>
                <div id="chat-with-name" class="font-bold text-gray-800">Чат</div>
            </div>
        </div>

        <div id="messages-area" class="flex-1 overflow-y-auto p-4 flex flex-col">
            <div id="chat-welcome" class="m-auto text-center">
                <div class="bg-black/10 backdrop-blur px-4 py-2 rounded-full text-white text-sm">
                    Выберите, кому написать
                </div>
            </div>
        </div>

        <div id="input-area" class="hidden p-4 bg-white flex items-center gap-4 border-t">
            <input type="text" id="message-input" placeholder="Напишите сообщение..." class="flex-1 focus:outline-none text-md">
            <button id="send-btn" class="bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform">
                <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Данные в точности как на скриншоте image_6317c6.jpg
    const firebaseConfig = {
        apiKey: "AIzaSyAlZlsZBFQlr702pr-hAq89OWTND5JoSwQ",
        authDomain: "telegramclone-d153d.firebaseapp.com",
        projectId: "telegramclone-d153d",
        storageBucket: "telegramclone-d153d.firebasestorage.app",
        messagingSenderId: "718418974581",
        appId: "1:718418974581:web:142c671b83244eb77d4f3c",
        measurementId: "G-S9WKXJJ18F"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'telegramclone-d153d';

    let currentUser = null;
    let activeChatUserId = null;
    let unsubscribeMessages = null;

    const ui = {
        authOverlay: document.getElementById('auth-overlay'),
        username: document.getElementById('username-input'),
        password: document.getElementById('password-input'),
        error: document.getElementById('auth-error'),
        loginBtn: document.getElementById('login-btn'),
        usersList: document.getElementById('users-list'),
        messagesArea: document.getElementById('messages-area'),
        messageInput: document.getElementById('message-input'),
        sendBtn: document.getElementById('send-btn'),
        chatHeader: document.getElementById('chat-header'),
        inputArea: document.getElementById('input-area'),
        chatName: document.getElementById('chat-with-name'),
        chatAvatar: document.getElementById('chat-avatar'),
        myAvatar: document.getElementById('my-avatar'),
        myDisplayName: document.getElementById('current-user-display'),
        welcome: document.getElementById('chat-welcome')
    };

    const handleLogin = async () => {
        const name = ui.username.value.trim().toLowerCase();
        const pass = ui.password.value.trim();

        if (!name || !pass) {
            showError("Заполните все поля");
            return;
        }

        ui.loginBtn.disabled = true;
        ui.loginBtn.innerHTML = '<div class="loader"></div>';
        ui.error.classList.add('hidden');

        try {
            // Вход в систему (Анонимный)
            const { user } = await signInAnonymously(auth);

            // Проверка аккаунта в базе
            const accountRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', name);
            const accountDoc = await getDoc(accountRef);

            if (accountDoc.exists()) {
                if (accountDoc.data().password !== pass) {
                    throw new Error("Неверный пароль");
                }
                currentUser = { ...accountDoc.data(), uid: user.uid };
            } else {
                // Создаем новый
                currentUser = { uid: user.uid, name: name, password: pass };
                await setDoc(accountRef, currentUser);
                // Добавляем в список пользователей
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), {
                    uid: user.uid,
                    name: name
                });
            }

            ui.authOverlay.classList.add('hidden');
            ui.myDisplayName.innerText = currentUser.name;
            ui.myAvatar.innerText = currentUser.name.charAt(0).toUpperCase();
            loadUsers();

        } catch (e) {
            showError(e.message);
            ui.loginBtn.disabled = false;
            ui.loginBtn.innerText = "Войти / Зарегистрироваться";
        }
    };

    const showError = (msg) => {
        ui.error.innerText = msg;
        ui.error.classList.remove('hidden');
    };

    ui.loginBtn.onclick = handleLogin;

    function loadUsers() {
        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
        onSnapshot(q, (snap) => {
            ui.usersList.innerHTML = '';
            snap.forEach(docSnap => {
                const u = docSnap.data();
                if (u.uid === currentUser.uid) return;

                const item = document.createElement('div');
                item.className = `user-item flex items-center gap-3 cursor-pointer ${activeChatUserId === u.uid ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center text-white font-bold">
                        ${u.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="font-medium">${u.name}</div>
                `;
                item.onclick = () => selectChat(u);
                ui.usersList.appendChild(item);
            });
        });
    }

    function selectChat(user) {
        activeChatUserId = user.uid;
        ui.chatHeader.classList.remove('hidden');
        ui.inputArea.classList.remove('hidden');
        ui.welcome.classList.add('hidden');
        ui.chatName.innerText = user.name;
        ui.chatAvatar.innerText = user.name.charAt(0).toUpperCase();
        loadMessages();
    }

    function loadMessages() {
        if (unsubscribeMessages) unsubscribeMessages();
        const roomId = [currentUser.uid, activeChatUserId].sort().join('_');
        const q = query(
            collection(db, 'artifacts', appId, 'public', 'data', 'chats', roomId, 'messages'),
            orderBy('timestamp', 'asc')
        );

        unsubscribeMessages = onSnapshot(q, (snap) => {
            ui.messagesArea.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMine = m.senderId === currentUser.uid;
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${isMine ? 'message-sent' : 'message-received'}`;
                bubble.innerText = m.text;
                ui.messagesArea.appendChild(bubble);
            });
            ui.messagesArea.scrollTop = ui.messagesArea.scrollHeight;
        });
    }

    async function sendMessage() {
        const text = ui.messageInput.value.trim();
        if (!text || !activeChatUserId) return;
        
        ui.messageInput.value = '';
        const roomId = [currentUser.uid, activeChatUserId].sort().join('_');
        
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chats', roomId, 'messages'), {
            text,
            senderId: currentUser.uid,
            timestamp: serverTimestamp()
        });
    }

    ui.sendBtn.onclick = sendMessage;
    ui.messageInput.onkeydown = (e) => e.key === 'Enter' && sendMessage();
</script>

</body>
</html>
