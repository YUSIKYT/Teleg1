<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Telegram Clone</title>
    <!-- Tailwind CSS для красивого дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0e1621; color: white; font-family: sans-serif; }
        .chat-bg { 
            background-color: #0e1621;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: cover; 
            background-blend-mode: overlay;
        }
        .message-in { background-color: #182533; border-radius: 10px 10px 10px 0; }
        .message-out { background-color: #2b5278; border-radius: 10px 10px 0 10px; align-self: flex-end; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- Экран входа / регистрации -->
    <div id="auth-screen" class="bg-[#17212b] p-8 rounded-lg shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-white">Вход в Telegram 2</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Email (любой, например test@mail.ru)" class="w-full p-3 rounded bg-[#0e1621] border border-[#2b5278] text-white focus:outline-none">
            <input id="password" type="password" placeholder="Пароль (минимум 6 символов)" class="w-full p-3 rounded bg-[#0e1621] border border-[#2b5278] text-white focus:outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-[#2481cc] hover:bg-[#28a1ff] p-3 rounded font-bold transition text-white">Войти</button>
            <button onclick="handleAuth('register')" class="w-full border border-[#2481cc] text-[#2481cc] hover:bg-[#2481cc] hover:text-white p-3 rounded font-bold transition">Создать аккаунт</button>
        </div>
        <p id="auth-error" class="text-red-400 mt-4 text-sm hidden text-center"></p>
    </div>

    <!-- Главный экран чата -->
    <div id="chat-screen" class="hidden w-full max-w-4xl h-[90vh] bg-[#17212b] rounded-lg shadow-2xl flex flex-col overflow-hidden">
        <div class="bg-[#17212b] p-4 border-b border-[#0e1621] flex justify-between items-center">
            <div>
                <h3 class="font-bold text-white">Общий чат</h3>
                <p id="user-status" class="text-xs text-gray-400">...</p>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-white">Выйти</button>
        </div>

        <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-3 chat-bg">
            <!-- Здесь будут появляться сообщения -->
        </div>

        <form id="message-form" class="p-4 bg-[#17212b] flex space-x-2 border-t border-[#0e1621]">
            <input id="message-input" type="text" placeholder="Написать сообщение..." autocomplete="off" class="flex-1 p-3 rounded-full bg-[#0e1621] border border-[#2b5278] text-white focus:outline-none">
            <button type="submit" class="bg-[#2481cc] p-3 rounded-full hover:bg-[#28a1ff] text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ТВОИ КЛЮЧИ ИЗ СКРИНШОТА
        const manualConfig = {
            apiKey: "AIzaSyDQfLxYzKGRohppEmJ8X7Xl8w35Mmt5K1Y",
            authDomain: "telegram2-d3ed0.firebaseapp.com",
            projectId: "telegram2-d3ed0",
            storageBucket: "telegram2-d3ed0.firebasestorage.app",
            messagingSenderId: "774354782781",
            appId: "1:774354782781:web:813ee118414182b6d0f854",
            measurementId: "G-R8P2T05ZSJ"
        };

        const app = initializeApp(manualConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const userStatus = document.getElementById('user-status');
        const authError = document.getElementById('auth-error');

        let currentUser = null;

        // Вход и Регистрация
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            authError.classList.add('hidden');

            if (!email || !password) {
                authError.innerText = "Заполните все поля!";
                authError.classList.remove('hidden');
                return;
            }

            try {
                if (type === 'register') {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                authError.innerText = "Ошибка: " + error.message;
                authError.classList.remove('hidden');
            }
        };

        window.logout = () => signOut(auth);

        // Следим за тем, вошел ли пользователь
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                userStatus.innerText = `Вы: ${user.email}`;
                loadMessages();
            } else {
                currentUser = null;
                authScreen.classList.remove('hidden');
                chatScreen.classList.add('hidden');
            }
        });

        // Загрузка сообщений
        function loadMessages() {
            const messagesRef = collection(db, 'messages');
            const q = query(messagesRef, orderBy('createdAt', 'asc'));

            onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.uid === currentUser?.uid;
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `max-w-[80%] p-3 shadow-md mb-2 ${isMe ? 'message-out' : 'message-in'}`;
                    
                    msgDiv.innerHTML = `
                        <p class="text-[10px] text-blue-400 font-bold mb-1">${isMe ? 'Вы' : data.email.split('@')[0]}</p>
                        <p class="text-sm text-white">${data.text}</p>
                    `;
                    messagesContainer.appendChild(msgDiv);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, (error) => {
                console.error("Ошибка! Проверь, включен ли Firestore в режиме Test Mode:", error);
            });
        }

        // Отправка сообщения
        messageForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            try {
                const messagesRef = collection(db, 'messages');
                await addDoc(messagesRef, {
                    text: text,
                    uid: currentUser.uid,
                    email: currentUser.email,
                    createdAt: serverTimestamp()
                });
                messageInput.value = '';
            } catch (error) {
                console.error("Ошибка отправки:", error);
            }
        };
    </script>
</body>
</html>
