<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tg-blue: #2481cc;
            --tg-bg: #f4f4f5;
            --tg-white: #ffffff;
            --tg-gray: #8e8e93;
            --tg-border: #dfe1e5;
            --tg-chat-bg: #e7ebf0;
        }

        body {
            background-color: var(--tg-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            height: 95vh;
            width: 95vw;
            max-width: 1200px;
            background: var(--tg-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            border-right: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--tg-chat-bg);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-repeat: repeat;
        }

        .message-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            position: relative;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-sent {
            background-color: #effdde;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message-received {
            background-color: var(--tg-white);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .timestamp {
            font-size: 10px;
            color: #a1a1a1;
            margin-left: 8px;
            float: right;
            margin-top: 6px;
        }

        #messages-area::-webkit-scrollbar {
            width: 6px;
        }
        #messages-area::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .user-item {
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-item:hover { background: #f4f4f5; }
        .user-item.active { background: var(--tg-blue); color: white !important; }
        .user-item.active .text-gray-500 { color: #e0e0e0 !important; }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #2481cc 0%, #1c66a3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--tg-blue);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
        <div class="w-20 h-20 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i class="fa-brands fa-telegram text-4xl text-white"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Telegram Web</h2>
        <p class="text-gray-500 mb-8 text-sm">Вход по логину и паролю</p>
        
        <input type="text" id="username-input" placeholder="Логин (имя)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
        
        <input type="password" id="password-input" placeholder="Пароль" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
        
        <div id="auth-error" class="text-red-500 text-xs mb-4 hidden p-2 bg-red-50 rounded">Ошибка</div>
        
        <button id="login-btn" class="w-full bg-blue-500 text-white p-4 rounded-xl font-bold hover:bg-blue-600 transition-all shadow-md active:scale-95">Войти / Регистрация</button>
        
        <p class="mt-4 text-[10px] text-gray-400">Убедитесь, что в Firebase включен "Anonymous Auth".</p>
    </div>
</div>

<div class="chat-container">
    <div class="sidebar">
        <div class="p-4 flex items-center gap-4">
            <i class="fa-solid fa-bars text-gray-400 text-xl cursor-pointer"></i>
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" placeholder="Поиск" class="w-full bg-gray-100 rounded-full py-2 pl-9 pr-4 text-sm focus:outline-none focus:ring-1 focus:ring-blue-300">
            </div>
        </div>
        
        <div id="users-list" class="flex-1 overflow-y-auto">
            <div class="flex flex-col items-center justify-center h-full text-gray-400 p-8 text-center text-sm">
                Загрузка...
            </div>
        </div>

        <div class="p-4 border-t bg-gray-50 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div id="my-avatar" class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold shadow-sm">?</div>
                <span id="current-user-display" class="text-xs font-semibold text-gray-700 truncate max-w-[120px]">Имя</span>
            </div>
            <i class="fa-solid fa-gear text-gray-400 cursor-pointer hover:text-blue-500"></i>
        </div>
    </div>

    <div class="main-chat">
        <div id="chat-header" class="hidden p-3 bg-white border-b flex items-center justify-between shadow-sm z-10">
            <div class="flex items-center gap-3">
                <div id="chat-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold shadow-sm">?</div>
                <div>
                    <div id="chat-with-name" class="font-bold text-gray-800">Имя контакта</div>
                    <div class="text-xs text-blue-500 font-medium">в сети</div>
                </div>
            </div>
            <div class="flex gap-5 text-gray-400 pr-2">
                <i class="fa-solid fa-phone cursor-pointer hover:text-blue-500"></i>
                <i class="fa-solid fa-video cursor-pointer hover:text-blue-500"></i>
                <i class="fa-solid fa-ellipsis-vertical cursor-pointer hover:text-blue-500"></i>
            </div>
        </div>

        <div id="messages-area" class="flex-1 overflow-y-auto p-6 flex flex-col space-y-1">
            <div id="chat-welcome" class="m-auto text-center max-w-xs">
                <div class="bg-black/20 backdrop-blur-md text-white rounded-2xl p-4 text-sm">
                    Выберите пользователя слева
                </div>
            </div>
        </div>

        <div id="input-area" class="hidden p-4 bg-white flex items-center gap-4 border-t">
            <i class="fa-regular fa-face-smile text-gray-400 text-2xl cursor-pointer hover:text-blue-500"></i>
            <div class="flex-1 relative">
                <input type="text" id="message-input" placeholder="Написать сообщение..." class="w-full focus:outline-none py-2 text-md">
            </div>
            <i class="fa-solid fa-paperclip text-gray-400 text-xl cursor-pointer hover:text-blue-500"></i>
            <button id="send-btn" class="bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:bg-blue-600 transition-all active:scale-90">
                <i class="fa-solid fa-paper-plane text-sm ml-0.5"></i>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ПЕРЕД ИСПОЛЬЗОВАНИЕМ: Включите Anonymous Auth в консоли Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAlZlsZBFQlr702pr-hAq89OWTND5JoSwQ",
        authDomain: "telegramclone-d153d.firebaseapp.com",
        projectId: "telegramclone-d153d",
        storageBucket: "telegramclone-d153d.firebasestorage.app",
        messagingSenderId: "718418974581",
        appId: "1:718418974581:web:142c671b83244eb77d4f3c",
        measurementId: "G-S9WKXJJ18F"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const activeAppId = 'telegramclone-d153d';

    let currentUser = null;
    let activeChatUserId = null;
    let unsubscribeMessages = null;

    const ui = {
        authOverlay: document.getElementById('auth-overlay'),
        usernameInput: document.getElementById('username-input'),
        passwordInput: document.getElementById('password-input'),
        authError: document.getElementById('auth-error'),
        loginBtn: document.getElementById('login-btn'),
        usersList: document.getElementById('users-list'),
        messagesArea: document.getElementById('messages-area'),
        messageInput: document.getElementById('message-input'),
        sendBtn: document.getElementById('send-btn'),
        chatHeader: document.getElementById('chat-header'),
        inputArea: document.getElementById('input-area'),
        chatWithName: document.getElementById('chat-with-name'),
        chatAvatar: document.getElementById('chat-avatar'),
        myAvatar: document.getElementById('my-avatar'),
        currentUserDisplay: document.getElementById('current-user-display'),
        welcome: document.getElementById('chat-welcome')
    };

    // Главная функция входа
    const login = async () => {
        const name = ui.usernameInput.value.trim().toLowerCase();
        const password = ui.passwordInput.value.trim();
        
        if (!name || !password) {
            showError("Введите логин и пароль");
            return;
        }
        
        ui.loginBtn.disabled = true;
        ui.authError.classList.add('hidden');
        ui.loginBtn.innerHTML = '<div class="loader mx-auto"></div>';

        try {
            // ШАГ 1: Анонимная авторизация (проверка включения провайдера)
            const authResult = await signInAnonymously(auth).catch(err => {
                if (err.code === 'auth/operation-not-allowed') {
                    throw new Error("Включите 'Anonymous' в меню Authentication -> Sign-in method!");
                }
                throw err;
            });
            
            const user = authResult.user;

            // ШАГ 2: Проверка аккаунта в базе данных
            const userRef = doc(db, 'artifacts', activeAppId, 'public', 'data', 'accounts', name);
            const userDoc = await getDoc(userRef);

            if (userDoc.exists()) {
                const data = userDoc.data();
                if (data.password !== password) {
                    throw new Error("Неверный пароль для этого имени");
                }
                currentUser = { ...data, uid: data.uid };
            } else {
                // Регистрируем нового
                const newUser = {
                    uid: user.uid,
                    name: name,
                    password: password,
                    createdAt: serverTimestamp()
                };
                await setDoc(userRef, newUser);
                await setDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'users', user.uid), {
                    uid: user.uid,
                    name: name
                });
                currentUser = newUser;
            }

            ui.authOverlay.style.display = 'none';
            ui.currentUserDisplay.innerText = currentUser.name;
            ui.myAvatar.innerText = currentUser.name.charAt(0).toUpperCase();
            loadUsers();

        } catch (e) {
            console.error(e);
            showError(e.message);
            ui.loginBtn.disabled = false;
            ui.loginBtn.innerText = "Войти / Регистрация";
        }
    };

    function showError(text) {
        ui.authError.innerText = text;
        ui.authError.classList.remove('hidden');
    }

    ui.loginBtn.onclick = login;

    function loadUsers() {
        const q = query(collection(db, 'artifacts', activeAppId, 'public', 'data', 'users'));
        onSnapshot(q, (snap) => {
            ui.usersList.innerHTML = '';
            snap.forEach(docSnap => {
                const u = docSnap.data();
                if (u.uid === currentUser.uid) return;
                
                const el = document.createElement('div');
                el.className = `user-item p-4 flex items-center gap-4 border-b border-gray-50 ${activeChatUserId === u.uid ? 'active' : ''}`;
                el.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-blue-400 flex items-center justify-center text-white font-bold text-lg">
                        ${u.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold truncate">${u.name}</div>
                        <div class="text-xs text-gray-500">Нажми, чтобы написать</div>
                    </div>
                `;
                el.onclick = () => selectChat(u);
                ui.usersList.appendChild(el);
            });
            if (!ui.usersList.children.length) ui.usersList.innerHTML = '<div class="p-8 text-center text-gray-400">Пока никого нет</div>';
        });
    }

    function selectChat(user) {
        activeChatUserId = user.uid;
        ui.chatHeader.classList.remove('hidden');
        ui.inputArea.classList.remove('hidden');
        if (ui.welcome) ui.welcome.style.display = 'none';
        ui.chatWithName.innerText = user.name;
        ui.chatAvatar.innerText = user.name.charAt(0).toUpperCase();
        loadMessages();
    }

    function loadMessages() {
        if (unsubscribeMessages) unsubscribeMessages();
        const roomId = [currentUser.uid, activeChatUserId].sort().join('_');
        const q = query(
            collection(db, 'artifacts', activeAppId, 'public', 'data', 'chats', roomId, 'messages'), 
            orderBy('timestamp', 'asc')
        );
        
        unsubscribeMessages = onSnapshot(q, (snap) => {
            ui.messagesArea.innerHTML = '';
            snap.forEach(docSnap => {
                const m = docSnap.data();
                const mine = m.senderId === currentUser.uid;
                const el = document.createElement('div');
                el.className = `message-bubble ${mine ? 'message-sent' : 'message-received'}`;
                const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                el.innerHTML = `<div>${m.text}</div><span class="timestamp">${time}</span>`;
                ui.messagesArea.appendChild(el);
            });
            ui.messagesArea.scrollTo({ top: ui.messagesArea.scrollHeight, behavior: 'smooth' });
        });
    }

    async function send() {
        const text = ui.messageInput.value.trim();
        if (!text || !activeChatUserId) return;
        const roomId = [currentUser.uid, activeChatUserId].sort().join('_');
        ui.messageInput.value = '';
        try {
            await addDoc(collection(db, 'artifacts', activeAppId, 'public', 'data', 'chats', roomId, 'messages'), {
                text: text,
                senderId: currentUser.uid,
                timestamp: serverTimestamp()
            });
        } catch (e) { console.error("Send Error:", e); }
    }

    ui.sendBtn.onclick = send;
    ui.messageInput.onkeypress = (e) => e.key === 'Enter' && send();
</script>
</body>
</html>
